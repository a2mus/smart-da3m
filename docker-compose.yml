version: "3.8"

services:
  # PostgreSQL 16+ Database
  postgres:
    image: postgres:16-alpine
    container_name: ihsane-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ihsane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ihsane-network

  # Valkey 8.x (Redis-compatible cache, session store, Celery broker)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: ihsane-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ihsane-network

  # Backend API (Development mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ihsane-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ihsane
      - REDIS_URL=redis://valkey:6379/0
      - CELERY_BROKER_URL=redis://valkey:6379/1
      - CELERY_RESULT_BACKEND=redis://valkey:6379/2
      - DEBUG=true
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - ihsane-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (Background tasks)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ihsane-celery-worker
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ihsane
      - REDIS_URL=redis://valkey:6379/0
      - CELERY_BROKER_URL=redis://valkey:6379/1
      - CELERY_RESULT_BACKEND=redis://valkey:6379/2
    depends_on:
      - postgres
      - valkey
    networks:
      - ihsane-network
    command: celery -A app.core.celery worker --loglevel=info

volumes:
  postgres_data:
  valkey_data:

networks:
  ihsane-network:
    driver: bridge
