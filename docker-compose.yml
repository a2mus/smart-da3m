# version field removed – obsolete in Compose v2+

services:
  # PostgreSQL 16+ Database
  postgres:
    image: postgres:16-alpine
    container_name: ihsane-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ihsane
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ihsane-network

  # Valkey 8.x (Redis-compatible cache, session store, Celery broker)
  valkey:
    image: valkey/valkey:8-alpine
    container_name: ihsane-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ihsane-network

  # Backend API (Development mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ihsane-backend
    ports:
      - "8001:8000"  # host 8001 → container 8000 (avoids Docker Desktop's port 8000 reservation on Windows)
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ihsane
      - REDIS_URL=redis://valkey:6379/0
      - CELERY_BROKER_URL=redis://valkey:6379/1
      - CELERY_RESULT_BACKEND=redis://valkey:6379/2
      - DEBUG=true
      - SECRET_KEY=dev-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - ihsane-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Celery Worker (Background tasks)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ihsane-celery-worker
    volumes:
      - ./backend:/app
      - /app/__pycache__
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ihsane
      - REDIS_URL=redis://valkey:6379/0
      - CELERY_BROKER_URL=redis://valkey:6379/1
      - CELERY_RESULT_BACKEND=redis://valkey:6379/2
    depends_on:
      - postgres
      - valkey
    networks:
      - ihsane-network
    command: celery -A app.core.celery worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Frontend (Vue 3 + Vite development server)
  frontend:
    image: node:20-alpine
    container_name: ihsane-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8001
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev"
    depends_on:
      - backend
    networks:
      - ihsane-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  valkey_data:

networks:
  ihsane-network:
    driver: bridge
